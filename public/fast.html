<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SaralSQL Fast Playground</title>

<style>
* { box-sizing:border-box; }

body{
  margin:0;
  height:100vh;
  display:grid;
  grid-template-columns: 1.3fr 360px 520px;
  font-family:system-ui;
  background:#020617;
  color:white;
}

.panel{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.panel-header{
  padding:18px 20px;
  border-bottom:1px solid #1e293b;
  font-weight:700;
  color:#93c5fd;
  background:#08101d;
}

.left{
  border-right:1px solid #1e293b;
}

.middle{
  border-right:1px solid #1e293b;
  background:#0b1220;
}

.right{
  background:#111827;
}

textarea{
  flex:1;
  width:100%;
  border:0;
  outline:none;
  resize:none;
  padding:24px;
  background:#020617;
  color:#f8fafc;
  font:14px Consolas, monospace;
  line-height:1.65;
}

.scroll{
  flex:1;
  overflow:auto;
  padding:16px;
}

.card{
  background:#1e293b;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.15s;
}

.card:hover{
  transform:translateY(-2px);
  background:#26344d;
}

.label{
  color:#94a3b8;
  font-size:12px;
  margin-bottom:6px;
}

.value{
  font-size:28px;
  font-weight:700;
}

.time{
  color:#86efac;
  float:right;
}

pre{
  margin:0;
  white-space:pre-wrap;
  word-break:break-word;
  color:#d1d5db;
  font:13px Consolas, monospace;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="panel left">
  <div class="panel-header">SQL Editor</div>
  <textarea id="sql">SELECT * FROM Users WHERE Id = 1;</textarea>
</div>

<div class="panel middle">
  <div class="panel-header">
    Parse Result
    <span id="time" class="time">-- ms</span>
  </div>
  <div id="summary" class="scroll"></div>
</div>

<div class="panel right">
  <div class="panel-header" id="detailTitle">Details</div>
  <div class="scroll">
    <pre id="details">Click a card to inspect details.</pre>
  </div>
</div>

<script src="fast.js"></script>

</body>
</html>
